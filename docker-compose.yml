version: '3.8'

services:
  intellica-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production

    container_name: intellica-app

    # Port mapping - frontend and backend on same port
    ports:
      - "${PORT:-5000}:5000"

    # Environment variables
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}

    # Restart policy
    restart: unless-stopped

    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Volume for uploads (persistent storage)
    volumes:
      - intellica-uploads:/app/backend/uploads

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  intellica-uploads:
